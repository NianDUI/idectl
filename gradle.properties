# Project
pluginGroup = com.niandui
pluginVersion = 1.0.0

# Target IntelliJ Platform (IntelliJ IDEA Community, used only for compiling against the SDK).
# The built plugin also runs on IntelliJ IDEA Ultimate.
# Target is 2026.x only (user runs 2026) — no backward-compat obligations, so we compile
# against a modern SDK and drop all legacy (233~) fallbacks.
platformType = IC
platformVersion = 2026.1.4

# Gradle
org.gradle.jvmargs = -Xmx2048m -XX:+UseParallelGC
org.gradle.caching = true
org.gradle.configuration-cache = false

# Kotlin stdlib is provided by the IntelliJ Platform - don't bundle our own copy.
kotlin.stdlib.default.dependency = false
